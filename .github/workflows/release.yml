name: Release Build

on:
  push:
    tags:
      - 'v*'

# 解決 403 錯誤：必須明確授予建立 Release 的權限
permissions:
  contents: write

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build macOS DMG and Portable
        run: |
          ./gradlew :composeApp:packageDmg
          ./gradlew :composeApp:createDistributable
          # 使用絕對路徑確保壓縮檔案在根目錄
          cd composeApp/build/compose/binaries/main/app
          zip -r "${{ github.workspace }}/UiAutomatorViewer-mac-portable.zip" .

      - name: Upload macOS Artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: |
            composeApp/build/compose/binaries/main/dmg/*.dmg
            UiAutomatorViewer-mac-portable.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'
          cache: 'gradle'

      - name: Build Windows EXE and Portable
        run: |
          ./gradlew :composeApp:packageExe
          ./gradlew :composeApp:createDistributable
          # Windows 使用 PowerShell 壓縮
          powershell Compress-Archive -Path composeApp/build/compose/binaries/main/app/* -DestinationPath UiAutomatorViewer-win-portable.zip

      - name: Upload Windows Artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: |
            composeApp/build/compose/binaries/main/exe/*.exe
            UiAutomatorViewer-win-portable.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
